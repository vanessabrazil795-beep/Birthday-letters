<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Switch OS: Happy Birthday, Andrea!! 🌸</title>
    <!-- Premium Rounded Gaming Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Glowing Header -->
    <div class="birthday-banner-header">
        <h1>HAPPY BIRTHDAY, ANDREA!! 👑</h1>
    </div>

    <!-- Radiant Ambient Light Environment -->
    <div class="neon-pink-glow-bg"></div>
    <div class="sparkle-grid"></div>

    <!-- Floating Balloon Sprites -->
    <div class="balloon b1">🎈</div>
    <div class="balloon b2">💝</div>

    <!-- Active Streamer Confetti Elements -->
    <div class="confetti c1"></div>
    <div class="confetti c2"></div>
    <div class="confetti c3"></div>
    <div class="confetti c4"></div>

    <!-- Global System Switch Toggle -->
    <input type="checkbox" id="system-power">
    
    <!-- Radiant Pulsing Activation Pad -->
    <label for="system-power" class="press-start-btn">
        ✨ TAP TO POWER ON ✨
    </label>

    <!-- Mobile-Responsive High-Glow Console Unit -->
    <label for="system-power" class="switch-console-mobile">
        
        <!-- Left Controller Frame (Neon Hot Sakura) -->
        <div class="joycon left-joycon">
            <div class="joystick-casing">
                <div class="joystick-thumb"></div>
            </div>
            <div class="d-pad">
                <div class="arrow up">▲</div>
                <div class="arrow left">◀</div>
                <div class="arrow right">▶</div>
                <div class="arrow down">▼</div>
            </div>
            <div class="capture-btn"></div>
        </div>

        <!-- Central High-Gloss Glass Monitor Display -->
        <div class="console-screen">
            <div class="screen-glare"></div>
            <div class="logo-badge">OLED BOOT SYSTEM ACTIVE...</div>
            <div class="neon-indicator-dot"></div>
            
            <!-- Hidden Slide-Up Custom Memory Cartridge (The Letter) -->
            <div class="game-cartridge-letter">
                <div class="ui-header">
                    <span class="system-tag">💖 PLAYER_1: ANDREA</span>
                    <span class="battery-status">🔋 100% LIFE</span>
                </div>
                
                <h2>Happy Birthday, Andrea! 🎉</h2>
                
                <p>Happy Birthday, my girlypop, Andrea! ✨</p>
                
                <p>I-enjoy mo nang sobra yung araw mo ngayon kasi deserve mo lahat ng saya sa mundo. Alam mo, iniisip ko pa rin minsan kung paano nga ba tayo naging magkaibigan? Hindi naman tayo naging magka-classmate, magkaiba yung circles natin nung una. Pero dahil magkaibigan kayo nina Cherish at Rischia, bigla na lang akong naging parte ng mundo mo, and honestly, that’s one of the best plot twists of my life.</p>
                
                <p>Thank you, Andrea, dahil bigla na lang din akong nakahanap ng safe space sa’yo. Kasama mo, I can just be completely myself. Space na ramdam kong tanggap ako, at safe ako.</p>
                
                <p>Kaya bago ka man tuluyang umalis (ang oa), I made this website for you. Consider this a digital time capsule of our friendship. Gusto kong baunin mo ito kahit saan ka man magpunta, para ipaalala sa’yo kung gaano ako kaswerteng nakilala kita, at kung gaano ka kahalaga sa akin at sa atin.</p>
                
                <p>Wherever life takes you next, may you always find a safe place, safe people, and a space where you can thrive and just be the amazing Andrea that you are. Standard layout man o magbago man ang takbo ng buhay, sana 10 years from now, and even beyond that, kilala pa rin natin ang isa't isa. Sana walang magbago sa bond natin.</p>
                
                <p class="closing">Sobrang mamimiss kita, girlypop. Palagi mong tatandaan na nandito lang ako para sa’yo, isang click o isang chat lang ang layo. Happy, happy birthday! I love you always! 🤍</p>
            </div>
        </div>

        <!-- Right Controller Frame (Neon Sky Cream Pink) -->
        <div class="joycon right-joycon">
            <div class="abxy-cluster">
                <div class="button-node X">X</div>
                <div class="button-node Y">Y</div>
                <div class="button-node A">A</div>
                <div class="button-node B">B</div>
            </div>
            <div class="joystick-casing">
                <div class="joystick-thumb"></div>
            </div>
            <div class="home-btn">
                <div class="home-ring"></div>
            </div>
        </div>

    </label>

</body>
</html>
